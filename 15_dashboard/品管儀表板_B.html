<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>品管儀表板_B</title>
<style>
  :root{--bg:#eaf4ff;--card:#ffffff;--border:#bfe0ff;--text:#234266;--accent:#2f9bf0;--good:#21b86b;--bad:#ff5d6c;--warn:#ff9f1c;}
  *{box-sizing:border-box;}
  body{margin:0;background:linear-gradient(180deg,#f0fef9,#e8f7f2);color:var(--text);font-family:"Microsoft JhengHei",Arial,sans-serif;padding:16px;}
  .main{display:grid;grid-template-columns:150px 1fr;gap:16px;max-width:1500px;margin:0;padding:0;}
  .sidebar{display:flex;flex-direction:column;gap:8px;margin-top:50px;align-self:stretch;}
  .btngrid{display:flex;flex-direction:column;gap:3px;margin-bottom:4px;border:none;border-radius:0;padding:0;flex:0;}
  .btngrid-row{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;flex:1;}
  .btngrid-row.all{grid-template-columns:1fr;flex:0;}
  button{cursor:pointer;border:1px solid var(--border);border-radius:3px;padding:8px 4px;font-size:12px;background:#eaf4ff;color:#4a6fa8;font-weight:normal;transition:all 0.2s;}
  button:hover{background:#d9ecff;}
  button.active{background:#2f9bf0;color:#ffffff;font-weight:bold;}
  .divider{border-top:1px solid var(--border);margin:3px 0;}
  .content{display:flex;flex-direction:column;gap:12px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;box-shadow:0 3px 10px rgba(47,155,240,0.12);}
  .card h3{margin:0 0 8px 0;font-size:14px;color:#1b6fc2;font-weight:bold;}
  .summaryRow{display:flex;gap:22px;align-items:flex-start;margin-top:6px;}
  .metric{text-align:center;}
  .metric .ico{font-size:18px;}
  .metric .num{font-size:18px;font-weight:bold;}
  .metric .lbl{font-size:11px;color:#6a90b8;}
  .green{color:var(--good);} .red{color:var(--bad);} .orange{color:var(--warn);}
  .grid2{display:grid;grid-template-columns:1fr 1.6fr;gap:12px;}
  .mapcard{position:relative;height:300px;overflow:hidden;}
  .mapsvg{width:100%;height:200px;}
  .cal{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;border:1px solid var(--border);border-radius:4px;padding:6px;margin-bottom:8px;}
  .cal button{background:#eaf4ff;color:var(--text);border:1px solid var(--border);border-radius:3px;padding:4px;cursor:pointer;font-size:12px;}
  .cal button.active{background:#2f9bf0;color:#ffffff;font-weight:bold;}
  .navbtns{display:flex;gap:4px;margin-top:8px;}
  .navbtns button{flex:1;background:#eaf4ff;color:var(--text);border:1px solid var(--border);border-radius:3px;padding:4px;cursor:pointer;font-size:12px;}
  .logo{width:57.6px;height:57.6px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;padding:0;background:transparent;}
  .logo img{width:50.4px;height:50.4px;object-fit:contain;background:transparent;filter:drop-shadow(0 0 2px rgba(255,255,255,0.3));}
.card.qc-section{background:rgba(74,111,168,0.08);}
.card.fty-section{background:rgba(150,150,150,0.08);}
</style>
</head>

<script>
function initMonthBtns(){
  const monthBtns = document.getElementById('monthBtns');
  for(let m=1;m<=12;m++){
    let btn = document.createElement('button');
    btn.textContent = m;
    btn.onclick = function(){
      document.querySelectorAll('#monthBtns button').forEach(b=>{
        b.classList.remove('active');
        b.style.background='#eaf4ff';
        b.style.color='var(--text)';
        b.style.fontWeight='normal';
      });
      this.classList.add('active');
      this.style.background='#2f9bf0';
      this.style.color='#ffffff';
      this.style.fontWeight='bold';
    };
    monthBtns.appendChild(btn);
  }
}

initMonthBtns();
</script>
